        function updatePageState(hasScroll, customHeight) {
            const wrapper = document.querySelector('.page-wrapper');
            if (hasScroll) {
                document.body.style.overflowY = "auto";
                // אנחנו מגדירים את הגובה ל-body כדי שהרקע יתממשק איתו
                document.body.style.height = customHeight;
                wrapper.style.height = customHeight;
            } else {
                document.body.style.overflowY = "hidden";
                document.body.style.height = "100vh";
                wrapper.style.height = "100vh";
                window.scrollTo(0, 0);
            }
        }
